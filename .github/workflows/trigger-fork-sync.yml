name: Trigger fork sync

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: fork-sync-main
  cancel-in-progress: true

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Trigger B repo sync
        env:
          GH_TOKEN: ${{ secrets.B_REPO_DISPATCH_TOKEN }}
        run: |
          response=$(curl -sS --connect-timeout 10 --max-time 30 --retry 2 -w "\nHTTP_STATUS:%{http_code}\n" -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/effytech10-bot/Shifats-Tale/dispatches \
            -d '{"event_type":"sync-upstream"}')

          echo "$response"

          status=$(echo "$response" | grep HTTP_STATUS | cut -d':' -f2)

          if [ "$status" != "204" ]; then
            echo "Dispatch failed with HTTP status $status"
            exit 1
          fi
