name: Sync from upstream

on:
  workflow_dispatch:
  repository_dispatch:
    types: [sync-upstream]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch upstream repo
        run: |
          git remote add upstream https://github.com/adnan-bin-wahid/Shifats-Tale.git
          git fetch upstream main

      - name: Backup only B sync workflow
        run: |
          mkdir -p /tmp/workflows
          cp .github/workflows/sync-upstream.yml /tmp/workflows/sync-upstream.yml

      - name: Copy upstream files except workflow files
        run: |
          rm -rf /tmp/upstream
          mkdir -p /tmp/upstream
          git archive upstream/main | tar -x -C /tmp/upstream

          rsync -a --delete \
            --exclude='.git/' \
            --exclude='.github/workflows/***' \
            /tmp/upstream/ ./

          rm -rf .github/workflows
          mkdir -p .github/workflows
          cp /tmp/workflows/sync-upstream.yml .github/workflows/sync-upstream.yml

      - name: Commit and push synced files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to sync"
            exit 0
          fi

          git commit -m "chore: sync from upstream"
          git push origin main
