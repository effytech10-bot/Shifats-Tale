name: Sync from upstream

on:
  workflow_dispatch:
  repository_dispatch:
    types: [sync-upstream]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch upstream repo
        run: |
          git remote add upstream https://github.com/adnan-bin-wahid/Shifats-Tale.git
          git fetch upstream main

      - name: Copy upstream files except workflow files
        run: |
          mkdir -p /tmp/upstream
          git archive upstream/main | tar -x -C /tmp/upstream

          mkdir -p /tmp/current-workflows
          cp -r .github/workflows /tmp/current-workflows/workflows

          rsync -a --delete \
            --exclude='.git/' \
            --exclude='.github/workflows/***' \
            /tmp/upstream/ ./

          mkdir -p .github
          rm -rf .github/workflows
          cp -r /tmp/current-workflows/workflows .github/workflows

      - name: Commit and push synced files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to sync"
            exit 0
          fi

          git commit -m "chore: sync from upstream"
          git push origin main
